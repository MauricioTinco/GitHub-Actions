jobs:
  build-and-deploy:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: 'Login via Azure CLI'
        uses: azure/login@v2
        with:
          creds: ${{ secrets.AZURE_ACCESS }}

      - name: 'Deploy to Azure'
        run: |
          # Aquí van tus comandos de despliegue, por ejemplo:
          az webapp up --name nombre-de-tu-app --resource-group nombre-rg