name: Pipeline Profesional de Redes

on:
  push:
    branches:
      - main

jobs:
  # Etapa 1: Preparación (podrías agregar aquí tests de sintaxis de red)
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - run: echo "Iniciando pipeline de despliegue de infraestructura..."

  # Etapa 2: Despliegue en DEV
  deploy-dev:
    needs: build
    runs-on: ubuntu-latest
    environment: DEV
    env:
      GRUPO: ${{ vars.GRUPO }}
    steps:
      - uses: actions/checkout@v4
      - uses: azure/login@v2
        with:
          creds: ${{ secrets.AZURE_ACCESS }}
      - run: |
          az network vnet create --resource-group "$GRUPO" --name "vnet-$GRUPO" --location eastus --address-prefix 10.0.0.0/16
          az network vnet subnet create --resource-group "$GRUPO" --vnet-name "vnet-$GRUPO" --name "subnet-$GRUPO" --address-prefixes 10.0.1.0/24

  # Etapa 3: Despliegue en QA (Requiere aprobación manual en GitHub)
  deploy-qa:
    needs: deploy-dev
    runs-on: ubuntu-latest
    environment: QA
    env:
      GRUPO: ${{ vars.GRUPO }}
    steps:
      - uses: azure/login@v2
        with:
          creds: ${{ secrets.AZURE_ACCESS }}
      - run: |
          az network vnet create --resource-group "$GRUPO" --name "vnet-$GRUPO" --location eastus --address-prefix 10.0.0.0/16
          az network vnet subnet create --resource-group "$GRUPO" --vnet-name "vnet-$GRUPO" --name "subnet-$GRUPO" --address-prefixes 10.0.1.0/24

  # Etapa 4: Despliegue en PROD (Requiere aprobación manual en GitHub)
  deploy-prod:
    needs: deploy-staging # O 'deploy-qa' según tu nomenclatura
    runs-on: ubuntu-latest
    environment: PROD
    env:
      GRUPO: ${{ vars.GRUPO }}
    steps:
      - uses: azure/login@v2
        with:
          creds: ${{ secrets.AZURE_ACCESS }}
      - run: |
          az network vnet create --resource-group "$GRUPO" --name "vnet-$GRUPO" --location eastus --address-prefix 10.0.0.0/16
          az network vnet subnet create --resource-group "$GRUPO" --vnet-name "vnet-$GRUPO" --name "subnet-$GRUPO" --address-prefixes 10.0.1.0/24