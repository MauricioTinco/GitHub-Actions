name: Deploy a Azure

on:
  push:
    branches:
      - develop
      - release
      - main

jobs:
  deploy:
    runs-on: ubuntu-latest
    
    # Asignación dinámica de ambiente según la rama
    environment: 
      name: ${{ github.ref == 'refs/heads/main' && 'PROD' || (github.ref == 'refs/heads/release' && 'QA' || 'DEV') }}
    
    steps:
      - uses: actions/checkout@v4

      - name: 'Login via Azure CLI'
        uses: azure/login@v2
        with:
          creds: ${{ secrets.AZURE_ACCESS }}

      - name: 'Desplegar en Azure'
        # Mapeamos la variable de entorno de GitHub 'GRUPO' a una variable de shell
        env:
          GRUPO: ${{ vars.GRUPO }}
        run: |
          echo "Desplegando en el grupo: $GRUPO"
          
          # Crear VNet
          az network vnet create \
            --resource-group "$GRUPO" \
            --name "vnet-$GRUPO" \
            --location eastus \
            --address-prefix 10.0.0.0/16
          
          # Crear Subnet
          echo "Creando Subnet..."
          az network vnet subnet create \
            --resource-group "$GRUPO" \
            --vnet-name "vnet-$GRUPO" \
            --name "subnet-$GRUPO" \
            --address-prefixes 10.0.1.0/24